[template]
name = "web-app"
description = "Django + HTMX full-stack web application with vanilla CSS"
version = "1.0.0"
author = "Alex Cabrera"
url = "https://github.com/theydontwantyoutovibecode/webapp-made-in-dade"
aliases = ["webapp", "django"]

[scaffold]
exclude = [".git", "dade.toml", ".dade", "__pycache__", "*.pyc", ".venv", "db.sqlite3", "staticfiles", "node_modules", ".read-only", "tailwind.config.js"]
setup = "./setup.sh"
setup_interactive = true

[serve]
type = "command"
dev = "uv run python manage.py runserver 127.0.0.1:$PORT"
prod = "uv run gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4"
port_env = "PORT"
default_port = 8000

[dev]
setup = ["uv sync --dev", "uv run python manage.py migrate --no-input"]
background = ["tailwindcss -i static/css/input.css -o static/css/main.css --watch"]
env = ["DJANGO_SETTINGS_MODULE=config.settings.development"]

[share]
env = ["DJANGO_EXTRA_ALLOWED_HOSTS=.trycloudflare.com", "DJANGO_CSRF_TRUSTED_ORIGINS=https://*.trycloudflare.com"]

[prod]
setup = ["uv sync --extra prod", "uv run python manage.py migrate --no-input", "uv run python manage.py collectstatic --no-input"]
env = ["DJANGO_SETTINGS_MODULE=config.settings.production"]
